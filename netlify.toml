# Netlify Configuration for Rocky Website

[build]
# Build command
command = "pip install -r requirements_web.txt && python -m pip install gunicorn"
# Directory to publish
publish = "."

[functions]
# Node functions directory (if needed)
node_bundler = "esbuild"

# Environment variables
[build.environment]
PYTHON_VERSION = "3.11"
NETLIFY_PYTHON_VERSION = "3.11"

# Redirect all requests to Flask app
[[redirects]]
from = "/*"
to = "/.netlify/functions/server"
status = 200

# API routes for chat
[[redirects]]
from = "/api/*"
to = "/.netlify/functions/server"
status = 200

# Static files (sprites)
[[redirects]]
from = "/sprites/*"
to = "/sprites/:splat"
status = 200
force = false

# Health check
[[redirects]]
from = "/health"
to = "/.netlify/functions/server"
status = 200

# Custom headers
[[headers]]
for = "/*"
[headers.values]
X-Content-Type-Options = "nosniff"
X-Frame-Options = "SAMEORIGIN"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
for = "/sprites/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.html"
[headers.values]
Cache-Control = "public, max-age=3600"
